<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoodToKnow – Hostansicht</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0b0920;
  --bg2:     #16103a;
  --card:    rgba(255,255,255,0.07);
  --border:  rgba(255,255,255,0.11);
  --primary: #8b5cf6;
  --ph:      #7c3aed;
  --accent:  #06b6d4;
  --heart:   #ef4444;
  --green:   #22c55e;
  --gold:    #f59e0b;
  --text:    #f1f5f9;
  --muted:   #94a3b8;
  --r:       14px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,var(--bg) 0%,var(--bg2) 100%);min-height:100vh;color:var(--text);overflow-x:hidden;}

/* Header */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 22px;background:rgba(11,9,32,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.logo{font-size:1.35rem;font-weight:900;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.host-badge{background:linear-gradient(135deg,var(--gold),#fbbf24);color:#000;padding:5px 13px;border-radius:20px;font-size:.68rem;font-weight:700;letter-spacing:.1em;}
.btn-reset{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.35);color:#fca5a5;padding:7px 15px;border-radius:9px;cursor:pointer;font-family:inherit;font-size:.82rem;font-weight:600;transition:all .2s;}
.btn-reset:hover{background:rgba(239,68,68,.28);}

/* Layout */
.layout{display:grid;grid-template-columns:270px 1fr;gap:14px;padding:14px;min-height:calc(100vh - 55px);}

/* Sidebar */
.sidebar{display:flex;flex-direction:column;gap:9px;}
.sec-title{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);padding:0 4px 4px;}
.p-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:10px 13px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(8px);transition:all .3s;}
.p-card.dead{opacity:.3;filter:grayscale(1);}
.p-card.loser{border-color:var(--heart);background:rgba(239,68,68,.1);animation:shake .4s ease;}
.p-card.active-player{border-color:var(--primary);background:rgba(139,92,246,.15);box-shadow:0 0 14px rgba(139,92,246,.2);}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.p-name{font-weight:600;font-size:.9rem;display:flex;align-items:center;gap:6px;}
.p-active-dot{width:7px;height:7px;border-radius:50%;background:var(--primary);animation:pulse 1.2s infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.5}}
.p-meta{display:flex;align-items:center;gap:7px;}
.hearts{display:flex;gap:3px;font-size:.95rem;}
.hf{color:var(--heart);}
.he{opacity:.2;}
.vote-badge{background:rgba(139,92,246,.25);border:1px solid rgba(139,92,246,.4);color:#c4b5fd;border-radius:20px;padding:2px 8px;font-size:.68rem;font-weight:700;}
.vote-badge.leader{background:rgba(239,68,68,.25);border-color:rgba(239,68,68,.5);color:#fca5a5;}

/* Main */
.main{display:flex;flex-direction:column;gap:13px;}

/* Card */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;backdrop-filter:blur(10px);}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 20px;border-radius:10px;border:none;cursor:pointer;font-family:inherit;font-size:.87rem;font-weight:700;transition:all .2s;letter-spacing:.03em;white-space:nowrap;}
.btn-p{background:var(--primary);color:#fff;}
.btn-p:hover{background:var(--ph);transform:translateY(-1px);box-shadow:0 6px 20px rgba(139,92,246,.4);}
.btn-g{background:var(--green);color:#000;}
.btn-g:hover{background:#16a34a;transform:translateY(-1px);box-shadow:0 6px 20px rgba(34,197,94,.4);}
.btn-gold{background:var(--gold);color:#000;}
.btn-gold:hover{background:#d97706;transform:translateY(-1px);box-shadow:0 6px 20px rgba(245,158,11,.4);}
.btn-danger{background:var(--heart);color:#fff;}
.btn-danger:hover{background:#dc2626;transform:translateY(-1px);box-shadow:0 6px 20px rgba(239,68,68,.4);}
.btn-out{background:transparent;border:1px solid var(--border);color:var(--text);}
.btn-out:hover{border-color:var(--primary);background:rgba(139,92,246,.1);}
.btn-lg{padding:14px 28px;font-size:1rem;}
.btn-xl{padding:18px 32px;font-size:1.1rem;}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:none!important;}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;}

/* Inputs */
.inp{flex:1;background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:inherit;font-size:.93rem;padding:11px 14px;outline:none;transition:border-color .2s;}
.inp:focus{border-color:var(--primary);}
.inp::placeholder{color:var(--muted);}
.add-form{display:flex;gap:9px;margin-bottom:8px;}

/* Phase pill */
.phase-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(139,92,246,.18);border:1px solid rgba(139,92,246,.3);color:#c4b5fd;border-radius:20px;padding:5px 13px;font-size:.67rem;font-weight:700;letter-spacing:.09em;margin-bottom:11px;}
.dot-pulse{width:7px;height:7px;border-radius:50%;background:var(--primary);animation:pulse 1.4s infinite;flex-shrink:0;}

/* Labels */
.lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.14em;margin-bottom:7px;}
.lbl-p{color:var(--primary);}
.lbl-g{color:var(--green);}
.lbl-gold{color:var(--gold);}

/* Question / Answer */
.q-text{font-size:1.5rem;font-weight:700;line-height:1.35;}
.a-divider{width:40px;height:2px;background:linear-gradient(90deg,var(--primary),var(--accent));margin:16px 0;border-radius:1px;}
.a-text{font-size:1.2rem;font-weight:700;color:var(--green);}

/* Judge buttons */
.judge-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px;}

/* Voting tally */
.tally-row{display:flex;align-items:center;gap:11px;padding:10px 13px;background:rgba(255,255,255,.04);border-radius:10px;border:1px solid var(--border);transition:border-color .3s;}
.tally-row.top{border-color:rgba(239,68,68,.5);background:rgba(239,68,68,.07);}
.tally-name{flex:1;font-weight:600;font-size:.88rem;}
.tally-bar-bg{flex:2;height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;}
.tally-bar{height:100%;background:var(--primary);border-radius:3px;transition:width .4s ease;}
.tally-bar.top{background:var(--heart);}
.tally-num{font-size:1.05rem;font-weight:800;min-width:26px;text-align:center;color:var(--primary);}
.tally-num.top{color:var(--heart);}

/* Round history */
.history-list{display:flex;flex-direction:column;gap:7px;}
.history-row{display:flex;align-items:flex-start;gap:10px;padding:10px 13px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.03);}
.history-row.correct{border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.05);}
.history-row.wrong{border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.05);}
.history-verdict{font-size:1.1rem;flex-shrink:0;margin-top:1px;}
.history-player{font-weight:700;font-size:.82rem;flex-shrink:0;min-width:70px;color:var(--primary);}
.history-q{font-size:.8rem;color:var(--muted);flex:1;line-height:1.35;}
.history-a{font-size:.78rem;font-weight:600;color:var(--text);flex-shrink:0;text-align:right;max-width:140px;}

/* Lobby player row */
.lobby-row{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:rgba(255,255,255,.04);border-radius:9px;border:1px solid var(--border);margin-bottom:6px;}
.rm-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.95rem;padding:2px 6px;border-radius:6px;transition:color .2s;}
.rm-btn:hover{color:var(--heart);}

/* Current player big banner */
.cp-banner{display:flex;align-items:center;gap:16px;padding:16px 20px;background:rgba(139,92,246,.12);border:1px solid rgba(139,92,246,.35);border-radius:var(--r);}
.cp-icon{font-size:2rem;flex-shrink:0;}
.cp-info{flex:1;}
.cp-label{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.13em;color:var(--primary);margin-bottom:3px;}
.cp-name{font-size:1.8rem;font-weight:900;line-height:1;}
.cp-sub{font-size:.78rem;color:var(--muted);margin-top:3px;}

/* Timer controls row */
.timer-controls{display:flex;gap:9px;flex-wrap:wrap;margin-top:13px;}

/* Elimination */
.elim-box{text-align:center;padding:30px 20px;}
.elim-icon{font-size:3.8rem;animation:pop .5s ease;}
@keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.15)}100%{transform:scale(1)}}
.elim-name{font-size:2.3rem;font-weight:900;margin:8px 0 5px;}
.elim-hearts{font-size:1.5rem;margin-top:6px;}
.elim-msg{font-size:.95rem;color:var(--muted);}

/* Finals */
.finals-players{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:14px;}
.fp-card{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:var(--r);padding:15px;text-align:center;transition:all .3s;}
.fp-card.active{border-color:var(--primary);background:rgba(139,92,246,.12);box-shadow:0 0 20px rgba(139,92,246,.18);}
.fp-card.done{border-color:var(--green);background:rgba(34,197,94,.07);}
.fp-name{font-size:.95rem;font-weight:700;margin-bottom:5px;}
.fp-score{font-size:.82rem;color:var(--muted);}
.fp-score span{color:var(--text);font-weight:700;}
.fp-dots{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin-top:7px;}
.dot{width:11px;height:11px;border-radius:50%;}
.dot-e{background:rgba(255,255,255,.15);}
.dot-c{background:var(--green);}
.dot-w{background:var(--heart);}
.judge-row{display:flex;gap:10px;justify-content:center;margin-top:13px;}

/* Gameover */
.win-box{text-align:center;padding:48px 28px;}
.trophy{font-size:4.5rem;animation:float 2.2s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.win-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.2em;color:var(--muted);margin:12px 0 5px;}
.win-name{font-size:2.8rem;font-weight:900;background:linear-gradient(135deg,var(--gold),#fbbf24,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.win-sub{font-size:.95rem;color:var(--muted);margin-top:7px;}

/* Confetti */
.confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;}

/* Tiebreak banner */
.tb-banner{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:10px;padding:11px 14px;font-size:.83rem;color:#fde68a;display:flex;align-items:center;gap:7px;margin-bottom:11px;}

.gold-pill{background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.3);color:#fde68a;}
</style>
</head>
<body>

<header class="hdr">
  <div class="logo">GoodToKnow</div>
  <div class="host-badge">👑 HOSTANSICHT</div>
  <button class="btn-reset" onclick="socket.emit('resetGame')">↺ Zurücksetzen</button>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sec-title">Spieler</div>
    <div id="sidebarPlayers"></div>
  </aside>
  <main class="main" id="main"></main>
</div>

<canvas class="confetti" id="confettiCanvas"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let S = null;

/* Track last fully-rendered question state to avoid button-destroying re-renders on timer ticks */
let _lrPhase = null, _lrQ = null, _lrCP = null, _lrHistLen = -1;

socket.on('S', state => {
  S = state;
  /* If only the timer changed (same question phase, same question, same player, same history),
     do a cheap partial update so the RICHTIG/FALSCH buttons are never destroyed mid-click. */
  const onlyTimer = (
    state.phase === 'question' && _lrPhase === 'question' &&
    state.currentPlayer === _lrCP &&
    (state.question ? state.question.q : null) === _lrQ &&
    state.roundHistory.length === _lrHistLen
  );
  if (onlyTimer) { renderTimerOnly(); renderSidebar(); return; }
  _lrPhase   = state.phase;
  _lrCP      = state.currentPlayer;
  _lrQ       = state.question ? state.question.q : null;
  _lrHistLen = state.roundHistory.length;
  render();
});

/* Partial update: only swap the timer ring + status labels, leave buttons untouched */
function renderTimerOnly() {
  const el = document.getElementById('liveTimerHost');
  if (el) el.innerHTML = timerSVG(S.timer.rem, S.timer.total, 120);
  const banner = document.getElementById('timerDoneBanner');
  if (banner) banner.style.display = S.timerDone ? 'flex' : 'none';
  const pb = document.getElementById('btnPause');
  const rb = document.getElementById('btnResume');
  if (pb) pb.style.display = S.timer.running ? '' : 'none';
  if (rb) { rb.style.display = S.timer.running ? 'none' : ''; rb.disabled = S.timer.rem <= 0; }
  const svb = document.getElementById('btnStartVote');
  if (svb) svb.disabled = !!S.timerDone;
}

/* ── Helpers ── */
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt(s){ const m=Math.floor(s/60),sec=s%60; return `${m}:${String(sec).padStart(2,'0')}`; }
function timerColor(rem,total){ const p=rem/total; return p>.4?'#22c55e':p>.18?'#f59e0b':'#ef4444'; }

/* Self-contained timer SVG – no external CSS classes needed */
function timerSVG(rem, total, size) {
  size = size || 150;
  const half = size / 2;
  const R    = Math.round(half * 0.82);
  const C    = +(2 * Math.PI * R).toFixed(2);
  const col  = timerColor(rem, total);
  const off  = +(C * (1 - rem / total)).toFixed(2);
  const fs   = size < 130 ? '1.35rem' : '2rem';
  return `<div style="position:relative;width:${size}px;height:${size}px;flex-shrink:0;display:inline-block">
    <svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" style="display:block">
      <circle cx="${half}" cy="${half}" r="${R}" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="8"/>
      <circle cx="${half}" cy="${half}" r="${R}" fill="none" stroke="${col}" stroke-width="8"
        stroke-dasharray="${C}" stroke-dashoffset="${off}" stroke-linecap="round"
        transform="rotate(-90 ${half} ${half})"
        style="transition:stroke-dashoffset 1s linear,stroke .5s ease"/>
    </svg>
    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;white-space:nowrap">
      <div style="font-size:${fs};font-weight:900;color:${col};line-height:1;letter-spacing:-.02em">${fmt(rem)}</div>
      <div style="font-size:.58rem;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-top:3px">${S&&S.timer.running?'läuft':'pausiert'}</div>
    </div>
  </div>`;
}

function hearts(n, total=3){
  let h='';
  for(let i=0;i<total;i++) h+=`<span class="${i<n?'hf':'he'}">♥</span>`;
  return h;
}

/* ── Sidebar ── */
function renderSidebar(){
  if(!S) return;
  const voteCounts={};
  if(['voting','tiebreak'].includes(S.phase)){
    Object.values(S.votes).forEach(t=>{ voteCounts[t]=(voteCounts[t]||0)+1; });
  }
  const max=Math.max(0,...Object.values(voteCounts));
  document.getElementById('sidebarPlayers').innerHTML = S.players.map(p=>{
    const vc=voteCounts[p.name]||0;
    const isLoser=vc===max&&max>0&&['voting','tiebreak'].includes(S.phase)&&p.alive;
    const isCurrent=p.name===S.currentPlayer&&p.alive&&S.phase==='question';
    return `<div class="p-card ${p.alive?'':'dead'}${isLoser?' loser':''}${isCurrent?' active-player':''}">
      <span class="p-name">${isCurrent?'<span class="p-active-dot"></span>':''} ${esc(p.name)}</span>
      <div class="p-meta">
        ${vc>0&&p.alive?`<span class="vote-badge ${isLoser?'leader':''}">${vc}✗</span>`:''}
        <span class="hearts">${hearts(p.hearts)}</span>
      </div>
    </div>`;
  }).join('');
}

/* ── Main ── */
function render(){
  renderSidebar();
  const m=document.getElementById('main');
  switch(S.phase){
    case 'lobby':       m.innerHTML=buildLobby(); break;
    case 'question':    m.innerHTML=buildQuestion(); break;
    case 'voting':      m.innerHTML=buildVoting(false); break;
    case 'tiebreak':    m.innerHTML=buildVoting(true); break;
    case 'elimination': m.innerHTML=buildElimination(); break;
    case 'finals':      m.innerHTML=buildFinals(); break;
    case 'gameover':    m.innerHTML=buildGameover(); startConfetti(); break;
    default:            m.innerHTML='';
  }
}

/* ── LOBBY ── */
function buildLobby(){
  const canStart=S.players.length>=2;
  const rows=S.players.map(p=>`
    <div class="lobby-row">
      <span>${esc(p.name)}</span>
      <button class="rm-btn" onclick="socket.emit('removePlayer','${esc(p.name)}')">✕</button>
    </div>`).join('');
  return `<div class="card">
    <div class="phase-pill"><span class="dot-pulse"></span>LOBBY</div>
    <div class="sec-title" style="margin-bottom:11px">Spieler hinzufügen</div>
    <div class="add-form">
      <input class="inp" id="nInp" placeholder="Spielername…" maxlength="20"
        onkeydown="if(event.key==='Enter')addP()">
      <button class="btn btn-p" onclick="addP()">+ Hinzufügen</button>
    </div>
    <div style="margin-top:12px">${rows||'<div style="color:var(--muted);font-size:.83rem">Noch keine Spieler…</div>'}</div>
    <div class="btn-row">
      <button class="btn btn-g btn-lg" ${canStart?'':'disabled'} onclick="socket.emit('startGame')">
        ▶ Spiel starten (${S.players.length} Spieler)
      </button>
    </div>
  </div>`;
}
function addP(){
  const i=document.getElementById('nInp');
  if(!i||!i.value.trim()) return;
  socket.emit('addPlayer',i.value.trim()); i.value=''; i.focus();
}

/* ── QUESTION ── */
function buildQuestion(){
  const q=S.question||{};
  const cp=S.currentPlayer||'';
  const qNum=S.roundHistory.length+1;
  return `
  <div class="cp-banner">
    <div class="cp-icon">🎯</div>
    <div class="cp-info">
      <div class="cp-label">Jetzt dran</div>
      <div class="cp-name">${esc(cp)}</div>
      <div class="cp-sub">Frage ${qNum} dieser Runde · ${S.roundHistory.length} beantwortet</div>
    </div>
    <div id="liveTimerHost">${timerSVG(S.timer.rem, S.timer.total, 140)}</div>
  </div>
  <div id="timerDoneBanner" style="background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.4);border-radius:10px;padding:11px 16px;color:#fde68a;font-weight:700;font-size:.9rem;display:${S.timerDone?'flex':'none'};align-items:center;gap:8px">
    ⚠️ Zeit abgelaufen! Bitte aktuelle Frage noch als RICHTIG oder FALSCH werten.
  </div>
  <div class="timer-controls">
    <button id="btnPause" class="btn btn-out" onclick="socket.emit('pauseTimer')" style="display:${S.timer.running?'':'none'}">⏸ Pause</button>
    <button id="btnResume" class="btn btn-p" onclick="socket.emit('resumeTimer')" style="display:${S.timer.running?'none':''}" ${S.timer.rem<=0?'disabled':''}>▶ Weiter</button>
    <button id="btnStartVote" class="btn btn-gold" onclick="socket.emit('startVoting')" ${S.timerDone?'disabled':''}>📊 Abstimmung starten</button>
  </div>
  <div class="card">
    <div class="lbl lbl-p">Frage für ${esc(cp)}</div>
    <div class="q-text">${esc(q.q||'')}</div>
    <div class="a-divider"></div>
    <div class="lbl lbl-g">Antwort</div>
    <div class="a-text">${esc(q.a||'')}</div>
    <div class="judge-grid">
      <button class="btn btn-g btn-xl" onclick="socket.emit('markAnswer',true)">✓ RICHTIG</button>
      <button class="btn btn-danger btn-xl" onclick="socket.emit('markAnswer',false)">✗ FALSCH</button>
    </div>
  </div>
  ${S.roundHistory.length>0?buildHistoryCard():''}`;
}

/* ── HISTORY CARD ── */
function buildHistoryCard(){
  const rows=S.roundHistory.slice().reverse().map(h=>`
    <div class="history-row ${h.correct?'correct':'wrong'}">
      <span class="history-verdict">${h.correct?'✅':'❌'}</span>
      <span class="history-player">${esc(h.player)}</span>
      <span class="history-q">${esc(h.q)}</span>
      <span class="history-a">${esc(h.a)}</span>
    </div>`).join('');
  return `<div class="card">
    <div class="sec-title" style="margin-bottom:9px">Bisherige Antworten dieser Runde</div>
    <div class="history-list">${rows}</div>
  </div>`;
}

/* ── VOTING ── */
function buildVoting(isTiebreak){
  const alive=S.players.filter(p=>p.alive).map(p=>p.name);
  const pool=isTiebreak?S.tiebreak:alive;
  const counts={};
  pool.forEach(n=>{counts[n]=0;});
  Object.values(S.votes).forEach(t=>{if(counts[t]!==undefined)counts[t]++;});
  const maxV=Math.max(0,...Object.values(counts));
  const totalVoters=alive.length;

  const tallyRows=pool.map(name=>{
    const vc=counts[name]||0;
    const pct=totalVoters>0?(vc/totalVoters)*100:0;
    const isTop=vc===maxV&&maxV>0;
    return `<div class="tally-row ${isTop?'top':''}">
      <span class="tally-name">${esc(name)}</span>
      <div class="tally-bar-bg"><div class="tally-bar ${isTop?'top':''}" style="width:${pct}%"></div></div>
      <span class="tally-num ${isTop?'top':''}">${vc}</span>
    </div>`;
  }).join('');

  const votedLine=S.voted.map(v=>`<span style="color:var(--green);font-size:.78rem">✓${esc(v)}</span>`).join(' ');

  const historyHtml=S.roundHistory.length>0?`
    <div class="card" style="margin-bottom:0">
      <div class="sec-title" style="margin-bottom:8px">Fragen dieser Runde</div>
      <div class="history-list">
        ${S.roundHistory.map(h=>`
          <div class="history-row ${h.correct?'correct':'wrong'}">
            <span class="history-verdict">${h.correct?'✅':'❌'}</span>
            <span class="history-player">${esc(h.player)}</span>
            <span class="history-q">${esc(h.q)}</span>
            <span class="history-a">${esc(h.a)}</span>
          </div>`).join('')}
      </div>
    </div>` : '';

  return `
  ${isTiebreak?`<div class="tb-banner">⚖️ Unentschieden! Stechen zwischen: <strong>${pool.map(esc).join(', ')}</strong></div>`:''}
  <div class="card">
    <div class="phase-pill"><span class="dot-pulse"></span>${isTiebreak?'STECHEN':'ABSTIMMUNG'}</div>
    <div style="margin-bottom:11px;font-size:.82rem;color:var(--muted)">
      Abgestimmt: ${S.voted.length}/${totalVoters} &nbsp; ${votedLine}
    </div>
    <div style="display:flex;flex-direction:column;gap:7px;margin-bottom:13px">${tallyRows}</div>
    <div style="display:flex;gap:9px;flex-wrap:wrap">
      <button class="btn btn-danger btn-lg" onclick="socket.emit('resolveVotes')">⚡ Ergebnis auswerten</button>
      <button class="btn btn-out" onclick="socket.emit('resetVotes')">🔄 Abstimmung zurücksetzen</button>
    </div>
  </div>
  ${historyHtml}`;
}

/* ── ELIMINATION ── */
function buildElimination(){
  const e=S.eliminated||{};
  const alive=S.players.filter(p=>p.alive);
  const goFinals=alive.length===2;
  const heartStr=e.isOut?'💀':('❤️'.repeat(e.heartsLeft)+'🖤'.repeat(3-e.heartsLeft));
  return `<div class="card elim-box">
    <div class="phase-pill" style="justify-content:center"><span class="dot-pulse"></span>ERGEBNIS</div>
    <div class="elim-icon">${e.isOut?'💀':'💔'}</div>
    <div class="elim-name">${esc(e.name||'')}</div>
    <div class="elim-hearts">${heartStr}</div>
    <div class="elim-msg" style="margin-top:8px">${e.isOut?'ist ausgeschieden!':`hat noch ${e.heartsLeft} ${e.heartsLeft===1?'Herz':'Herzen'}.`}</div>
    <div class="btn-row" style="justify-content:center;margin-top:20px">
      ${goFinals
        ?`<button class="btn btn-gold btn-lg" onclick="socket.emit('nextRound')">🏆 Finale starten!</button>`
        :`<button class="btn btn-p btn-lg" onclick="socket.emit('nextRound')">▶ Nächste Runde (${alive.length} Spieler)</button>`}
    </div>
  </div>`;
}

/* ── FINALS ── */
function buildFinals(){
  const F=S.finals; if(!F) return '';
  const q=F.questions[F.qIdx]||{};
  const isResults=F.subphase==='results';

  function dots(scores){
    return Array.from({length:10},(_,i)=>{
      if(i<scores.length) return `<div class="dot ${scores[i]?'dot-c':'dot-w'}"></div>`;
      return `<div class="dot dot-e"></div>`;
    }).join('');
  }

  const pAActive=F.current===F.playerA&&!isResults;
  const pBActive=F.current===F.playerB&&!isResults;

  return `<div class="card">
    <div class="phase-pill gold-pill" style="justify-content:center">
      <span class="dot-pulse" style="background:var(--gold)"></span>
      FINALE – Runde ${F.round}
    </div>
    <div class="finals-players">
      <div class="fp-card ${pAActive?'active':''} ${isResults||F.subphase==='B_answering'?'done':''}">
        <div class="fp-name">${esc(F.playerA)}${pAActive?' ▶':''}</div>
        <div class="fp-score">Richtig: <span>${F.scoresA.filter(Boolean).length}</span>/${F.scoresA.length}</div>
        <div class="fp-dots">${dots(F.scoresA)}</div>
      </div>
      <div class="fp-card ${pBActive?'active':''} ${isResults?'done':''}">
        <div class="fp-name">${esc(F.playerB)}${pBActive?' ▶':''}</div>
        <div class="fp-score">Richtig: <span>${F.scoresB.filter(Boolean).length}</span>/${F.scoresB.length}</div>
        <div class="fp-dots">${dots(F.scoresB)}</div>
      </div>
    </div>
    ${isResults?`
      <div style="text-align:center;margin:10px 0 14px">
        ${F.scoreA!==F.scoreB
          ?`<div style="font-size:1.2rem;font-weight:800;color:var(--gold)">🏆 ${esc(F.scoreA>F.scoreB?F.playerA:F.playerB)} gewinnt! (${F.scoreA}:${F.scoreB})</div>`
          :`<div style="font-size:1rem;color:var(--gold)">⚖️ Unentschieden (${F.scoreA}:${F.scoreB})</div>`}
      </div>
      ${F.scoreA===F.scoreB?`<div class="btn-row" style="justify-content:center"><button class="btn btn-gold btn-lg" onclick="socket.emit('finalsNextRound')">▶ Neue Finale-Runde</button></div>`:''}
    `:`
      <div style="text-align:center;font-size:.72rem;color:var(--muted);margin-bottom:9px">Frage ${F.qIdx+1}/10 · ${esc(F.current)} antwortet</div>
      <div class="lbl lbl-p">Frage</div>
      <div class="q-text" style="font-size:1.3rem">${esc(q.q||'')}</div>
      <div class="a-divider"></div>
      <div class="lbl lbl-g">Antwort</div>
      <div class="a-text" style="font-size:1.05rem">${esc(q.a||'')}</div>
      <div class="judge-row" style="margin-top:16px">
        <button class="btn btn-g btn-lg" onclick="socket.emit('judgeAnswer',true)">✓ Richtig</button>
        <button class="btn btn-danger btn-lg" onclick="socket.emit('judgeAnswer',false)">✗ Falsch</button>
      </div>
    `}
  </div>`;
}

/* ── GAMEOVER ── */
function buildGameover(){
  return `<div class="card win-box">
    <div class="trophy">🏆</div>
    <div class="win-lbl">GEWINNER</div>
    <div class="win-name">${esc(S.winner||'')}</div>
    <div class="win-sub">hat das Spiel gewonnen!</div>
    <div class="btn-row" style="justify-content:center;margin-top:24px">
      <button class="btn btn-p btn-lg" onclick="socket.emit('resetGame')">↺ Neues Spiel</button>
    </div>
  </div>`;
}

/* ── Confetti ── */
let confettiActive=false;
function startConfetti(){
  if(confettiActive) return; confettiActive=true;
  const cvs=document.getElementById('confettiCanvas');
  const ctx=cvs.getContext('2d');
  cvs.width=window.innerWidth; cvs.height=window.innerHeight;
  const p=Array.from({length:130},()=>({
    x:Math.random()*cvs.width,y:Math.random()*-cvs.height,
    size:6+Math.random()*8,
    color:['#8b5cf6','#06b6d4','#f59e0b','#ef4444','#22c55e','#f1f5f9'][Math.floor(Math.random()*6)],
    speed:1+Math.random()*2.5,angle:Math.random()*Math.PI*2,spin:(Math.random()-.5)*.15,
  }));
  let f=0;
  function draw(){
    ctx.clearRect(0,0,cvs.width,cvs.height);
    p.forEach(x=>{
      x.y+=x.speed;x.x+=Math.sin(x.angle)*.8;x.angle+=x.spin;
      if(x.y>cvs.height){x.y=-20;x.x=Math.random()*cvs.width;}
      ctx.save();ctx.translate(x.x,x.y);ctx.rotate(x.angle);
      ctx.fillStyle=x.color;ctx.fillRect(-x.size/2,-x.size/4,x.size,x.size/2);
      ctx.restore();
    });
    if(++f<600) requestAnimationFrame(draw);
    else{ctx.clearRect(0,0,cvs.width,cvs.height);confettiActive=false;}
  }
  draw();
}
</script>
