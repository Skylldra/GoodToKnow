<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoodToKnow – Hostansicht</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0b0920;
  --bg2:       #16103a;
  --card:      rgba(255,255,255,0.07);
  --border:    rgba(255,255,255,0.11);
  --primary:   #8b5cf6;
  --primary-h: #7c3aed;
  --accent:    #06b6d4;
  --heart:     #ef4444;
  --green:     #22c55e;
  --gold:      #f59e0b;
  --text:      #f1f5f9;
  --muted:     #94a3b8;
  --r:         14px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,var(--bg) 0%,var(--bg2) 100%);
  min-height:100vh;color:var(--text);
  overflow-x:hidden;
}

/* ── Header ── */
.hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 24px;
  background:rgba(11,9,32,0.85);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;
}
.logo{
  font-size:1.4rem;font-weight:900;letter-spacing:-.02em;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.host-badge{
  background:linear-gradient(135deg,var(--gold),#fbbf24);
  color:#000;padding:5px 14px;border-radius:20px;
  font-size:.7rem;font-weight:700;letter-spacing:.1em;
}
.btn-reset{
  background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.35);
  color:#fca5a5;padding:7px 16px;border-radius:10px;
  cursor:pointer;font-family:inherit;font-size:.82rem;font-weight:600;
  transition:all .2s;
}
.btn-reset:hover{background:rgba(239,68,68,.28);}

/* ── Layout ── */
.layout{
  display:grid;
  grid-template-columns:280px 1fr;
  gap:16px;padding:16px;
  min-height:calc(100vh - 57px);
}

/* ── Sidebar ── */
.sidebar{display:flex;flex-direction:column;gap:10px;}
.sec-title{
  font-size:.68rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.12em;color:var(--muted);padding:0 4px 4px;
}
.p-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);padding:11px 14px;
  display:flex;align-items:center;justify-content:space-between;
  backdrop-filter:blur(8px);transition:all .35s;
}
.p-card.dead{opacity:.35;filter:grayscale(1);}
.p-card.loser{border-color:var(--heart);background:rgba(239,68,68,.1);animation:shake .4s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.p-name{font-weight:600;font-size:.92rem;}
.p-meta{display:flex;align-items:center;gap:8px;}
.hearts{display:flex;gap:3px;font-size:1rem;}
.h-full{color:var(--heart);}
.h-empty{opacity:.2;}
.vote-badge{
  background:rgba(139,92,246,.25);border:1px solid rgba(139,92,246,.4);
  color:#c4b5fd;border-radius:20px;padding:2px 9px;
  font-size:.7rem;font-weight:700;
}
.vote-badge.leader{background:rgba(239,68,68,.25);border-color:rgba(239,68,68,.5);color:#fca5a5;}

/* ── Main content ── */
.main{display:flex;flex-direction:column;gap:16px;}

/* Card base */
.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);padding:22px;
  backdrop-filter:blur(10px);
}

/* ── Lobby ── */
.add-form{display:flex;gap:10px;margin-bottom:8px;}
.inp{
  flex:1;background:rgba(255,255,255,.07);
  border:1px solid var(--border);border-radius:10px;
  color:var(--text);font-family:inherit;font-size:.95rem;
  padding:11px 15px;outline:none;transition:border-color .2s;
}
.inp:focus{border-color:var(--primary);}
.inp::placeholder{color:var(--muted);}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:7px;
  padding:11px 22px;border-radius:10px;border:none;cursor:pointer;
  font-family:inherit;font-size:.88rem;font-weight:700;
  transition:all .2s;letter-spacing:.04em;white-space:nowrap;
}
.btn-p{background:var(--primary);color:#fff;}
.btn-p:hover{background:var(--primary-h);transform:translateY(-1px);box-shadow:0 8px 22px rgba(139,92,246,.4);}
.btn-g{background:var(--green);color:#000;}
.btn-g:hover{background:#16a34a;transform:translateY(-1px);box-shadow:0 8px 22px rgba(34,197,94,.4);}
.btn-a{background:var(--accent);color:#000;}
.btn-a:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(6,182,212,.4);}
.btn-gold{background:var(--gold);color:#000;}
.btn-gold:hover{background:#d97706;transform:translateY(-1px);box-shadow:0 8px 22px rgba(245,158,11,.4);}
.btn-danger{background:var(--heart);color:#fff;}
.btn-danger:hover{background:#dc2626;transform:translateY(-1px);}
.btn-out{background:transparent;border:1px solid var(--border);color:var(--text);}
.btn-out:hover{border-color:var(--primary);background:rgba(139,92,246,.1);}
.btn-lg{padding:14px 30px;font-size:1rem;}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important;box-shadow:none!important;}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;}

/* ── Timer ── */
.timer-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;}
.timer-svg-box{position:relative;width:160px;height:160px;}
.timer-svg-box svg{width:160px;height:160px;}
.timer-center{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;pointer-events:none;
}
.timer-time{font-size:2.2rem;font-weight:900;letter-spacing:-.03em;line-height:1;}
.timer-lbl{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-top:3px;}
.timer-controls{display:flex;gap:8px;}

/* ── Question ── */
.q-label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.15em;color:var(--primary);margin-bottom:10px;}
.q-text{font-size:1.55rem;font-weight:700;line-height:1.35;color:var(--text);}
.a-divider{width:44px;height:2px;background:linear-gradient(90deg,var(--primary),var(--accent));margin:18px 0;border-radius:1px;}
.a-label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.15em;color:var(--green);margin-bottom:6px;}
.a-text{font-size:1.25rem;font-weight:700;color:var(--green);}

/* ── Voting tally ── */
.tally-row{
  display:flex;align-items:center;gap:12px;
  padding:11px 14px;background:rgba(255,255,255,.04);
  border-radius:10px;border:1px solid var(--border);
  transition:border-color .3s;
}
.tally-row.max-votes{border-color:rgba(239,68,68,.5);background:rgba(239,68,68,.07);}
.tally-name{flex:1;font-weight:600;font-size:.9rem;}
.tally-bar-bg{flex:2;height:7px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;}
.tally-bar{height:100%;background:var(--primary);border-radius:4px;transition:width .4s ease;}
.tally-bar.danger{background:var(--heart);}
.tally-num{font-size:1.1rem;font-weight:800;min-width:28px;text-align:center;color:var(--primary);}
.tally-num.danger{color:var(--heart);}
.voted-check{color:var(--green);font-size:.75rem;}

/* ── Elimination ── */
.elim-box{text-align:center;padding:32px 20px;}
.elim-icon{font-size:4rem;margin-bottom:10px;animation:pop .5s ease;}
@keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.15)}100%{transform:scale(1)}}
.elim-name{font-size:2.4rem;font-weight:900;margin-bottom:6px;}
.elim-msg{font-size:1rem;color:var(--muted);}
.elim-hearts{font-size:1.6rem;margin-top:8px;}

/* ── Finals ── */
.finals-header{text-align:center;margin-bottom:16px;}
.finals-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.18em;color:var(--gold);margin-bottom:6px;}
.finals-subtitle{font-size:1.1rem;font-weight:600;}
.finals-players{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.fp-card{
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-radius:var(--r);padding:16px;text-align:center;transition:all .3s;
}
.fp-card.active{border-color:var(--primary);background:rgba(139,92,246,.12);box-shadow:0 0 22px rgba(139,92,246,.18);}
.fp-card.done{border-color:var(--green);background:rgba(34,197,94,.08);}
.fp-name{font-size:1rem;font-weight:700;margin-bottom:6px;}
.fp-score{font-size:.85rem;color:var(--muted);}
.fp-score span{color:var(--text);font-weight:700;}
.fp-dots{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-top:8px;}
.dot{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,.15);}
.dot.correct{background:var(--green);}
.dot.wrong{background:var(--heart);}
.judge-row{display:flex;gap:10px;justify-content:center;margin-top:14px;}
.q-counter{font-size:.75rem;color:var(--muted);text-align:center;margin-bottom:8px;}

/* ── Gameover ── */
.win-box{text-align:center;padding:50px 30px;}
.trophy{font-size:5rem;animation:float 2.2s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.win-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.2em;color:var(--muted);margin:14px 0 6px;}
.win-name{
  font-size:3rem;font-weight:900;line-height:1.1;
  background:linear-gradient(135deg,var(--gold),#fbbf24,#f97316);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.win-sub{font-size:1rem;color:var(--muted);margin-top:8px;}
.confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;}

/* ── Phase label ── */
.phase-pill{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(139,92,246,.18);border:1px solid rgba(139,92,246,.3);
  color:#c4b5fd;border-radius:20px;padding:5px 14px;
  font-size:.7rem;font-weight:700;letter-spacing:.08em;
  margin-bottom:12px;
}
.dot-pulse{
  width:7px;height:7px;border-radius:50%;background:var(--primary);
  animation:pulse 1.4s infinite;
}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.5}}

/* ── Lobby player list ── */
.lobby-player-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 13px;background:rgba(255,255,255,.04);
  border-radius:10px;border:1px solid var(--border);
  margin-bottom:7px;
}
.remove-btn{
  background:none;border:none;color:var(--muted);
  cursor:pointer;font-size:1rem;padding:2px 6px;
  border-radius:6px;transition:color .2s;
}
.remove-btn:hover{color:var(--heart);}

/* Tiebreak info */
.tiebreak-info{
  background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);
  border-radius:10px;padding:12px 16px;
  font-size:.85rem;color:#fde68a;margin-bottom:12px;
  display:flex;align-items:center;gap:8px;
}
</style>
</head>
<body>

<!-- Header -->
<header class="hdr">
  <div class="logo">GoodToKnow</div>
  <div class="host-badge">👑 HOSTANSICHT</div>
  <button class="btn-reset" onclick="socket.emit('resetGame')">↺ Zurücksetzen</button>
</header>

<!-- Layout -->
<div class="layout">

  <!-- Sidebar: players -->
  <aside class="sidebar">
    <div class="sec-title">Spieler</div>
    <div id="sidebarPlayers"></div>
  </aside>

  <!-- Main -->
  <main class="main" id="main"></main>

</div>

<canvas class="confetti" id="confettiCanvas"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script>
/* ─── Socket ─── */
const socket = io();
let S = null;

socket.on('S', state => {
  S = state;
  render();
});

/* ─── Helpers ─── */
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function hearts(n, total = 3) {
  let h = '';
  for (let i = 0; i < total; i++)
    h += `<span class="h-${i < n ? 'full' : 'empty'}">♥</span>`;
  return h;
}
function fmt(s) {
  const m = Math.floor(s / 60), sec = s % 60;
  return `${m}:${String(sec).padStart(2,'0')}`;
}
function timerColor(rem, total) {
  const p = rem / total;
  if (p > .4) return '#22c55e';
  if (p > .18) return '#f59e0b';
  return '#ef4444';
}
function buildTimerSVG(rem, total) {
  const R = 66, C = 414.69; // 2π×66
  const col = timerColor(rem, total);
  const off = C * (1 - rem / total);
  return `
  <svg viewBox="0 0 160 160" width="160" height="160" style="display:block">
    <circle cx="80" cy="80" r="${R}" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="8"/>
    <circle cx="80" cy="80" r="${R}" fill="none" stroke="${col}" stroke-width="8"
      stroke-dasharray="${C}" stroke-dashoffset="${off}"
      stroke-linecap="round" transform="rotate(-90 80 80)"
      style="transition:stroke-dashoffset 1s linear,stroke .5s"/>
  </svg>
  <div class="timer-center">
    <div class="timer-time" style="color:${col}">${fmt(rem)}</div>
    <div class="timer-lbl">${S.timer.running ? 'läuft' : 'pausiert'}</div>
  </div>`;
}

/* ─── Sidebar ─── */
function renderSidebar() {
  if (!S) return;
  const el = document.getElementById('sidebarPlayers');
  const voteCounts = {};
  if (['voting','tiebreak'].includes(S.phase)) {
    Object.values(S.votes).forEach(t => { voteCounts[t] = (voteCounts[t]||0)+1; });
  }
  const max = Math.max(0, ...Object.values(voteCounts));

  el.innerHTML = S.players.map(p => {
    const vc = voteCounts[p.name] || 0;
    const isLoser = vc === max && max > 0 && ['voting','tiebreak'].includes(S.phase) && p.alive;
    return `<div class="p-card ${p.alive?'':'dead'}${isLoser?' loser':''}">
      <span class="p-name">${esc(p.name)}</span>
      <div class="p-meta">
        ${vc>0&&p.alive ? `<span class="vote-badge ${isLoser?'leader':''}">${vc}✗</span>` : ''}
        <span class="hearts">${hearts(p.hearts)}</span>
      </div>
    </div>`;
  }).join('');
}

/* ─── Main render ─── */
function render() {
  renderSidebar();
  const m = document.getElementById('main');
  switch(S.phase) {
    case 'lobby':       m.innerHTML = buildLobby(); break;
    case 'question':    m.innerHTML = buildQuestion(); break;
    case 'voting':      m.innerHTML = buildVoting(false); break;
    case 'tiebreak':    m.innerHTML = buildVoting(true); break;
    case 'elimination': m.innerHTML = buildElimination(); break;
    case 'finals':      m.innerHTML = buildFinals(); break;
    case 'gameover':    m.innerHTML = buildGameover(); startConfetti(); break;
    default:            m.innerHTML = '';
  }
}

/* ─── Phases ─── */
function buildLobby() {
  const canStart = S.players.length >= 2;
  const playerRows = S.players.map(p => `
    <div class="lobby-player-row">
      <span>${esc(p.name)}</span>
      <button class="remove-btn" title="Entfernen" onclick="socket.emit('removePlayer','${esc(p.name)}')">✕</button>
    </div>`).join('');
  return `
  <div class="card">
    <div class="phase-pill"><span class="dot-pulse"></span>LOBBY</div>
    <div class="sec-title" style="margin-bottom:12px">Spieler hinzufügen</div>
    <div class="add-form">
      <input class="inp" id="nameInp" placeholder="Spielername…" maxlength="20"
        onkeydown="if(event.key==='Enter')addP()">
      <button class="btn btn-p" onclick="addP()">+ Hinzufügen</button>
    </div>
    <div style="margin-top:14px">${playerRows || '<div style="color:var(--muted);font-size:.85rem">Noch keine Spieler…</div>'}</div>
    <div class="btn-row">
      <button class="btn btn-g btn-lg" ${canStart?'':'disabled'} onclick="socket.emit('startGame')">
        ▶ Spiel starten (${S.players.length} Spieler)
      </button>
    </div>
  </div>`;
}

function addP() {
  const inp = document.getElementById('nameInp');
  if (!inp || !inp.value.trim()) return;
  socket.emit('addPlayer', inp.value.trim());
  inp.value = '';
  inp.focus();
}

function buildQuestion() {
  const q = S.question || {};
  return `
  <div class="card">
    <div class="phase-pill"><span class="dot-pulse"></span>FRAGE LÄUFT</div>
    <div class="timer-wrap">
      <div class="timer-svg-box">${buildTimerSVG(S.timer.rem, S.timer.total)}</div>
      <div class="timer-controls">
        ${S.timer.running
          ? `<button class="btn btn-out" onclick="socket.emit('pauseTimer')">⏸ Pause</button>`
          : `<button class="btn btn-p" onclick="socket.emit('resumeTimer')" ${S.timer.rem<=0?'disabled':''}>▶ Weiter</button>`}
        <button class="btn btn-gold" onclick="socket.emit('startVoting')">📊 Abstimmung starten</button>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="q-label">Frage</div>
    <div class="q-text">${esc(q.q||'')}</div>
    <div class="a-divider"></div>
    <div class="a-label">Antwort</div>
    <div class="a-text">${esc(q.a||'')}</div>
  </div>`;
}

function buildVoting(isTiebreak) {
  const q = S.question || {};
  const alive = S.players.filter(p => p.alive).map(p => p.name);
  const pool  = isTiebreak ? S.tiebreak : alive;

  // Count votes
  const counts = {};
  pool.forEach(n => { counts[n] = 0; });
  Object.values(S.votes).forEach(t => { if (counts[t]!==undefined) counts[t]++; });
  const maxV = Math.max(0, ...Object.values(counts));
  const totalVotes = S.voted.length;
  const totalVoters = alive.length;

  const rows = pool.map(name => {
    const vc = counts[name]||0;
    const pct = totalVoters > 0 ? (vc/totalVoters)*100 : 0;
    const isMax = vc === maxV && maxV > 0;
    return `<div class="tally-row ${isMax?'max-votes':''}">
      <span class="tally-name">${esc(name)}</span>
      <div class="tally-bar-bg"><div class="tally-bar ${isMax?'danger':''}" style="width:${pct}%"></div></div>
      <span class="tally-num ${isMax?'danger':''}">${vc}</span>
    </div>`;
  }).join('');

  const votedNames = S.voted.map(v =>
    `<span style="color:var(--green);font-size:.8rem">✓ ${esc(v)}</span>`
  ).join('  ');

  return `
  ${isTiebreak ? `<div class="tiebreak-info">⚖️ Unentschieden! Nochmal abstimmen zwischen: <strong>${pool.map(esc).join(', ')}</strong></div>` : ''}
  <div class="card">
    <div class="phase-pill"><span class="dot-pulse"></span>${isTiebreak?'STECHEN':'ABSTIMMUNG'}</div>
    <div style="margin-bottom:12px">
      <span style="font-size:.82rem;color:var(--muted)">Abgestimmt: ${totalVotes}/${totalVoters}</span>
      ${votedNames ? `&nbsp;&nbsp;${votedNames}` : ''}
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px">${rows}</div>
    <button class="btn btn-danger btn-lg" onclick="socket.emit('resolveVotes')">
      ⚡ Ergebnis auswerten
    </button>
  </div>
  <div class="card">
    <div class="q-label">Frage dieser Runde</div>
    <div class="q-text" style="font-size:1.15rem">${esc(q.q||'')}</div>
    <div class="a-divider"></div>
    <div class="a-label">Antwort</div>
    <div class="a-text" style="font-size:1rem">${esc(q.a||'')}</div>
  </div>`;
}

function buildElimination() {
  const e = S.eliminated || {};
  const alive = S.players.filter(p => p.alive);
  const goFinals = alive.length === 2;

  const heartStr = e.isOut
    ? '💀 Ausgeschieden'
    : '❤️'.repeat(e.heartsLeft) + '🖤'.repeat(3 - e.heartsLeft);

  return `
  <div class="card elim-box">
    <div class="phase-pill" style="justify-content:center"><span class="dot-pulse"></span>ERGEBNIS</div>
    <div class="elim-icon">${e.isOut ? '💀' : '💔'}</div>
    <div class="elim-name">${esc(e.name||'')}</div>
    <div class="elim-hearts">${heartStr}</div>
    <div class="elim-msg" style="margin-top:10px">
      ${e.isOut ? 'ist raus!' : `hat noch ${e.heartsLeft} ${e.heartsLeft===1?'Herz':'Herzen'}.`}
    </div>
    <div class="btn-row" style="justify-content:center;margin-top:22px">
      ${goFinals
        ? `<button class="btn btn-gold btn-lg" onclick="socket.emit('nextRound')">🏆 Finale starten!</button>`
        : `<button class="btn btn-p btn-lg" onclick="socket.emit('nextRound')">▶ Nächste Runde (${alive.length} Spieler)</button>`}
    </div>
  </div>`;
}

function buildFinals() {
  const F = S.finals;
  if (!F) return '';
  const q = F.questions[F.qIdx] || {};
  const isResults = F.subphase === 'results';

  function dotsFor(scores, total=10) {
    let d = '';
    for (let i=0;i<total;i++) {
      if (i < scores.length) d += `<div class="dot ${scores[i]?'correct':'wrong'}"></div>`;
      else d += `<div class="dot"></div>`;
    }
    return d;
  }

  const pAActive = F.current === F.playerA && !isResults;
  const pBActive = F.current === F.playerB && !isResults;
  const pADone   = isResults || F.subphase === 'B_answering';
  const pBDone   = isResults;

  const resultHtml = isResults ? `
    <div style="text-align:center;margin:10px 0 16px">
      ${F.scoreA > F.scoreB
        ? `<div style="font-size:1.3rem;font-weight:800;color:var(--gold)">🏆 ${esc(F.playerA)} gewinnt das Finale! (${F.scoreA}:${F.scoreB})</div>`
        : F.scoreB > F.scoreA
        ? `<div style="font-size:1.3rem;font-weight:800;color:var(--gold)">🏆 ${esc(F.playerB)} gewinnt das Finale! (${F.scoreB}:${F.scoreA})</div>`
        : `<div style="font-size:1.1rem;color:var(--gold)">⚖️ Unentschieden! (${F.scoreA}:${F.scoreB}) – Neue Runde folgt.</div>`
      }
    </div>
    ${!isResults || F.scoreA===F.scoreB ? '' : ''}
    ` : '';

  const judgeHtml = !isResults ? `
    <div class="q-counter">Frage ${F.qIdx+1} von ${F.questions.length} &nbsp;·&nbsp; ${esc(F.current)} antwortet</div>
    <div class="card" style="margin-bottom:12px">
      <div class="q-label">Frage</div>
      <div class="q-text">${esc(q.q||'')}</div>
      <div class="a-divider"></div>
      <div class="a-label">Antwort</div>
      <div class="a-text">${esc(q.a||'')}</div>
    </div>
    <div class="judge-row">
      <button class="btn btn-g btn-lg" onclick="socket.emit('judgeAnswer',true)">✓ Richtig</button>
      <button class="btn btn-danger btn-lg" onclick="socket.emit('judgeAnswer',false)">✕ Falsch</button>
    </div>` : '';

  const nextHtml = isResults && F.scoreA===F.scoreB ? `
    <div class="btn-row" style="justify-content:center;margin-top:16px">
      <button class="btn btn-gold btn-lg" onclick="socket.emit('finalsNextRound')">▶ Neue Finale-Runde starten</button>
    </div>` : '';

  return `
  <div class="card">
    <div class="phase-pill" style="background:rgba(245,158,11,.15);border-color:rgba(245,158,11,.3);color:#fde68a">
      <span class="dot-pulse" style="background:var(--gold)"></span>
      FINALE – Runde ${F.round}
    </div>
    <div class="finals-players">
      <div class="fp-card ${pAActive?'active':''} ${pADone?'done':''}">
        <div class="fp-name">${esc(F.playerA)}</div>
        <div class="fp-score">Richtig: <span>${F.scoresA.filter(Boolean).length}</span> / ${F.scoresA.length}</div>
        <div class="fp-dots">${dotsFor(F.scoresA)}</div>
        ${pAActive ? '<div style="margin-top:6px;font-size:.75rem;color:var(--primary);font-weight:700">▶ DRAN</div>' : ''}
      </div>
      <div class="fp-card ${pBActive?'active':''} ${pBDone?'done':''}">
        <div class="fp-name">${esc(F.playerB)}</div>
        <div class="fp-score">Richtig: <span>${F.scoresB.filter(Boolean).length}</span> / ${F.scoresB.length}</div>
        <div class="fp-dots">${dotsFor(F.scoresB)}</div>
        ${pBActive ? '<div style="margin-top:6px;font-size:.75rem;color:var(--primary);font-weight:700">▶ DRAN</div>' : ''}
      </div>
    </div>
    ${resultHtml}
    ${judgeHtml}
    ${nextHtml}
  </div>`;
}

function buildGameover() {
  return `
  <div class="card win-box">
    <div class="trophy">🏆</div>
    <div class="win-label">GEWINNER</div>
    <div class="win-name">${esc(S.winner||'')}</div>
    <div class="win-sub">hat das Spiel gewonnen!</div>
    <div class="btn-row" style="justify-content:center;margin-top:28px">
      <button class="btn btn-p btn-lg" onclick="socket.emit('resetGame')">↺ Neues Spiel</button>
    </div>
  </div>`;
}

/* ─── Confetti ─── */
let confettiActive = false;
function startConfetti() {
  if (confettiActive) return;
  confettiActive = true;
  const cvs = document.getElementById('confettiCanvas');
  const ctx = cvs.getContext('2d');
  cvs.width = window.innerWidth; cvs.height = window.innerHeight;
  const particles = Array.from({length:130}, () => ({
    x: Math.random()*cvs.width, y: Math.random()*-cvs.height,
    size: 6+Math.random()*8,
    color: ['#8b5cf6','#06b6d4','#f59e0b','#ef4444','#22c55e','#f1f5f9'][Math.floor(Math.random()*6)],
    speed: 1+Math.random()*2.5,
    angle: Math.random()*Math.PI*2,
    spin: (Math.random()-.5)*.15,
  }));
  let frame=0;
  function draw() {
    ctx.clearRect(0,0,cvs.width,cvs.height);
    particles.forEach(p => {
      p.y += p.speed; p.x += Math.sin(p.angle)*.8; p.angle+=p.spin;
      if(p.y>cvs.height) { p.y=-20; p.x=Math.random()*cvs.width; }
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.angle);
      ctx.fillStyle=p.color; ctx.fillRect(-p.size/2,-p.size/4,p.size,p.size/2);
      ctx.restore();
    });
    if(++frame < 600) requestAnimationFrame(draw);
    else { ctx.clearRect(0,0,cvs.width,cvs.height); confettiActive=false; }
  }
  draw();
}
</script>
